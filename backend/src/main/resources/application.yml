spring:
  application:
    name: edulive-backend

  datasource:
    url: ${DB_URL:jdbc:h2:mem:videostreaming}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      continue-on-error: true
      platform: ${SQL_INIT_PLATFORM:postgresql}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  jpa:
    defer-datasource-initialization: ${DEFER_DS_INIT:false}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

# AWS Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID:}
  s3:
    uploads-bucket: ${UPLOADS_BUCKET:}
    recordings-bucket: ${RECORDINGS_BUCKET:edulive-dev-recordings}
  ses:
    sender-email: ${SES_SENDER_EMAIL:noreply@edulive.com}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}

jwt:
  secret: ${JWT_SECRET:myLocalDevSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

media-server:
  url: ${MEDIA_SERVER_URL:http://localhost:3000}
  websocket-url: ${MEDIA_SERVER_WS_URL:ws://localhost:3000/signaling}

ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.1:8b-instruct-q4_0}
  timeout-seconds: ${OLLAMA_TIMEOUT:60}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:3000}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Content-Type,Authorization
  allow-credentials: true

logging:
  level:
    com.videostreaming: ${LOG_LEVEL:DEBUG}
    org.springframework.web.socket: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
