# Test configuration - H2 in-memory database (already default in application.yml)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Redis auto-config (no Redis server available in tests)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoryAutoConfiguration

# Keep scheduling pool small (minimum 1 required)
spring.task.scheduling.pool.size=1

# Disable rate limiting in tests
rate-limit.enabled=false

# Quiet logging for tests
logging.level.com.videostreaming=WARN
logging.level.org.springframework.web.socket=WARN
