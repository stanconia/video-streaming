name: Deploy to Dev

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "214102106723"
  ECR_REGISTRY: 214102106723.dkr.ecr.us-east-1.amazonaws.com
  APP_NAME: edulive
  ENVIRONMENT: dev
  ECS_CLUSTER: EduLive-dev-cluster
  ECS_SERVICE: EduLive-dev-backend
  S3_BUCKET: edulive-dev-frontend-214102106723
  CLOUDFRONT_DISTRIBUTION_ID: E3KO6H4L3WCITY

jobs:
  # ─── Detect what changed ───
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      media: ${{ steps.filter.outputs.media }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            media:
              - 'media-server/**'
            infra:
              - 'infrastructure/**'

  # ─── Deploy Backend ───
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.ECR_REGISTRY }}/${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}-api:latest \
            ./backend
          docker push ${{ env.ECR_REGISTRY }}/${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}-api:latest

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "ECS redeployment triggered"

  # ─── Deploy Media Server ───
  deploy-media:
    name: Deploy Media Server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.media == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push media server image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.ECR_REGISTRY }}/${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}-media-server:latest \
            ./media-server
          docker push ${{ env.ECR_REGISTRY }}/${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}-media-server:latest

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "ECS redeployment triggered"

  # ─── Deploy Frontend ───
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          CI=false npm run build

      - name: Upload to S3
        run: |
          aws s3 sync frontend/build s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" > /dev/null
          echo "CloudFront invalidation started for https://d2mv0p0scx4qgr.cloudfront.net"

  # ─── Deploy Infrastructure ───
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CDK stacks
        working-directory: infrastructure
        run: |
          npm install
          npx cdk deploy --all --require-approval never

  # ─── Summary ───
  deploy-summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [changes, deploy-backend, deploy-media, deploy-frontend, deploy-infra]
    if: always()
    steps:
      - name: Print deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.changes.outputs.frontend }} | ${{ needs.deploy-frontend.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.changes.outputs.backend }} | ${{ needs.deploy-backend.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Media Server | ${{ needs.changes.outputs.media }} | ${{ needs.deploy-media.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | ${{ needs.changes.outputs.infra }} | ${{ needs.deploy-infra.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** https://d2mv0p0scx4qgr.cloudfront.net" >> $GITHUB_STEP_SUMMARY
